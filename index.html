<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Henry Le — IT Business Analyst Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    :root{
      --blue:#2563EB;--blue-soft:#3B82F6;--blue-light:#EFF6FF;--blue-border:#BFDBFE;
      --text:#0F172A;--text-sec:#475569;--muted:#94A3B8;
      --bg:#FFFFFF;--surface:#F8FAFC;--card:#F1F5F9;--border:#E2E8F0;
    }

    html{scroll-behavior:smooth}

    body{
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--text);
      font-size:15px;
      line-height:1.6;
    }

    /* ACTIVE NAV */
    .topbar-nav a.active{
      color:var(--blue);
      font-weight:600;
      position:relative;
    }

    .topbar-nav a.active::after{
      content:'';
      position:absolute;
      left:0;
      bottom:-6px;
      width:100%;
      height:2px;
      background:var(--blue);
      border-radius:2px;
    }

    section{
      scroll-margin-top:80px;
    }

    /* TOPBAR */
    .topbar{
      position:fixed;top:0;left:0;right:0;height:56px;
      background:rgba(255,255,255,0.92);
      backdrop-filter:blur(12px);
      border-bottom:0.5px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 2.5rem;z-index:100;
    }

    .topbar-logo{
      font-family:'Space Grotesk',sans-serif;
      font-weight:700;
    }

    .topbar-logo span{color:var(--blue)}

    .topbar-nav{display:flex;gap:2rem}

    .topbar-nav a{
      font-size:0.8rem;
      color:var(--text-sec);
      text-decoration:none;
    }

    .topbar-cta{
      background:var(--blue);
      color:#fff;
      padding:7px 18px;
      border-radius:8px;
      text-decoration:none;
    }

    /* HERO */
    .hero{min-height:100vh;display:flex;align-items:center;padding:6rem 2.5rem 4rem;background:linear-gradient(135deg,#F8FAFC 0%,#EFF6FF 60%,#DBEAFE 100%)}

    .hero-inner{max-width:1100px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}

    .hero h1{font-family:'Space Grotesk';font-size:3rem}

    .hero h1 .accent{color:var(--blue)}

    /* SECTIONS */
    .section{padding:5rem 2.5rem}

    .section.alt{background:var(--surface)}

    .section-inner{max-width:1100px;margin:auto}

    /* EXPERIENCE */
    .exp-grid{display:grid;grid-template-columns:1fr 2fr;gap:4rem}

    /* CASE */
    .cases-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}

    /* SKILLS */
    .skills-layout{display:grid;grid-template-columns:1fr 1fr;gap:1rem}

    /* CONTACT */
    .contact-layout{display:grid;grid-template-columns:1fr 1fr;gap:3rem}

    /* FOOTER */
    .footer{
      background:#0F172A;
      color:#94A3B8;
      padding:2rem;
      display:flex;
      justify-content:space-between;
    }

    /* MOBILE */
    @media(max-width:768px){
      .hero-inner,.exp-grid,.cases-grid,.skills-layout,.contact-layout{
        grid-template-columns:1fr;
      }

      .topbar-nav{display:none}
    }
  </style>
</head>

<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-logo">Henry <span>Le</span></div>

  <nav class="topbar-nav">
    <a href="#experience">Experience</a>
    <a href="#projects">Projects</a>
    <a href="#skills">Skills</a>
    <a href="#contact">Contact</a>
  </nav>

  <a class="topbar-cta" href="mailto:henryleproduct@gmail.com">Hire me</a>
</header>

<!-- HERO -->
<section class="hero" id="home">
  <div class="hero-inner">
    <div>
      <h1>Minh Phat<br><span class="accent">(Henry) Le</span></h1>
      <p>IT Business Analyst · Product Owner · Ontario</p>
    </div>
  </div>
</section>

<!-- EXPERIENCE -->
<section class="section alt" id="experience">
  <div class="section-inner">
    <h2>Experience</h2>
  </div>
</section>

<!-- PROJECTS -->
<section class="section" id="projects">
  <div class="section-inner">
    <h2>Projects</h2>
  </div>
</section>

<!-- SKILLS -->
<section class="section alt" id="skills">
  <div class="section-inner">
    <h2>Skills</h2>
  </div>
</section>

<!-- CONTACT -->
<section class="section" id="contact">
  <div class="section-inner">
    <h2>Contact</h2>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div>Henry Le</div>
  <div>© 2026</div>
</footer>

<script>
// SMOOTH SCROLL
document.querySelectorAll('.topbar-nav a').forEach(link=>{
  link.addEventListener('click',function(e){
    e.preventDefault();

    const id=this.getAttribute('href').replace('#','');
    const target=document.getElementById(id);

    if(target){
      window.scrollTo({
        top:target.offsetTop-70,
        behavior:'smooth'
      });
    }
  });
});

// ACTIVE MENU ON SCROLL
const sections=document.querySelectorAll('section');
const links=document.querySelectorAll('.topbar-nav a');

window.addEventListener('scroll',()=>{
  let current='';

  sections.forEach(sec=>{
    const top=sec.offsetTop-120;
    if(pageYOffset>=top){
      current=sec.getAttribute('id');
    }
  });

  links.forEach(link=>{
    link.classList.remove('active');
    if(link.getAttribute('href').includes(current)){
      link.classList.add('active');
    }
  });
});
</script>

</body>
</html>
